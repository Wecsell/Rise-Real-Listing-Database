version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rise
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  listener:
    build: .
    restart: always
    stdin_open: true
    tty: true
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - ./app:/usr/src/app/app
      - ./data:/data
    ports:
      - "8080:8080"
    command: python -u app/listener.py

  whatsapp_listener:
    build: ./whatsapp_listener
    restart: always
    depends_on:
      - listener
    env_file:
      - .env
    volumes:
      - ./data:/data
    environment:
      - INGEST_URL=http://listener:8080/ingest

volumes:
  postgres_data:
  redis_data:
